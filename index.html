<style>
/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TOKENS \u2014 Neon Cyber Professional
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
:root {
  --bg:       #04040e;
  --bg2:      #06060f;
  --bg3:      #080818;
  --surface:  rgba(0,240,255,0.03);
  --surface2: rgba(0,240,255,0.06);

  /* Neon palette */
  --cyan:     #00f0ff;
  --cyan2:    #00c8e0;
  --cyan-dim: rgba(0,240,255,0.15);
  --pink:     #ff2d78;
  --pink-dim: rgba(255,45,120,0.12);
  --purple:   #9b5de5;
  --gold:     #ffd166;
  --gold2:    #ffea99;

  --white:    #e8f4f8;
  --white2:   #9ab0b8;
  --muted:    #445560;

  --border:   rgba(0,240,255,0.1);
  --border2:  rgba(0,240,255,0.3);
  --glow-c:   0 0 30px rgba(0,240,255,0.25);
  --glow-p:   0 0 30px rgba(255,45,120,0.25);

  /* Gradients */
  --g-cyan:   linear-gradient(135deg, #00f0ff, #00c8e0);
  --g-pink:   linear-gradient(135deg, #ff2d78, #9b5de5);
  --g-tri:    linear-gradient(135deg, #00f0ff 0%, #9b5de5 50%, #ff2d78 100%);
  --g-title:  linear-gradient(90deg, #00f0ff 0%, #ffffff 40%, #ff2d78 100%);
  --pad: 110px 0;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--white);
  font-family:'Tajawal',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* \u2500\u2500 Bilingual \u2500\u2500 */
[data-en]{display:none;}[data-ar]{display:revert;}
html[data-lang="en"] [data-ar]{display:none!important;}
html[data-lang="en"] [data-en]{display:revert!important;}
html[data-lang="en"]{direction:ltr;font-family:'Space Grotesk',sans-serif;}
html[data-lang="ar"] .hero-sub,html[data-lang="ar"] .about-desc,
html[data-lang="ar"] .svc-desc,html[data-lang="ar"] .testi-text,
html[data-lang="ar"] .pillar-desc,html[data-lang="ar"] .kpi-sub{font-family:'Tajawal',sans-serif;}
html[data-lang="en"] .about-desc,html[data-lang="en"] .svc-desc,
html[data-lang="en"] .testi-text,html[data-lang="en"] .testi-text-en,
html[data-lang="en"] .pillar-desc,html[data-lang="en"] .kpi-sub,
html[data-lang="en"] .hero-sub,html[data-lang="en"] .c-text{font-family:'Space Grotesk',sans-serif;font-weight:300;}
html[data-lang="en"] .sec-title-ar{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:3px;text-transform:uppercase;}
html[data-lang="en"] .btn-gold,html[data-lang="en"] .btn-outline,
html[data-lang="en"] .nav-links a,html[data-lang="en"] .mob-link,
html[data-lang="en"] .form-btn,html[data-lang="en"] .form-input,
html[data-lang="en"] .form-textarea{font-family:'Space Grotesk',sans-serif;}

/* \u2500\u2500 Direction switches \u2500\u2500 */
html[data-lang="ar"] .hero-divider{background:linear-gradient(to left,var(--cyan),transparent);}
html[data-lang="en"] .hero-divider{background:linear-gradient(to right,var(--cyan),transparent);}
html[data-lang="ar"] .about-visual{order:2;}html[data-lang="ar"] .about-text-col{order:1;}
html[data-lang="en"] .about-visual{order:1;}html[data-lang="en"] .about-text-col{order:2;}
html[data-lang="ar"] .contact-info{order:2;}html[data-lang="ar"] .contact-form-col{order:1;}
html[data-lang="en"] .contact-info{order:1;}html[data-lang="en"] .contact-form-col{order:2;}
html[data-lang="ar"] .met-fill{background:linear-gradient(to left,var(--cyan),var(--purple));}
html[data-lang="en"] .met-fill{background:linear-gradient(to right,var(--cyan),var(--purple));}
html[data-lang="ar"] .svc-arrow{transform:translateX(-8px);}
html[data-lang="en"] .svc-arrow{transform:translateX(8px);}
.svc-card:hover .svc-arrow{transform:translateX(0)!important;}
html[data-lang="ar"] .form-btn::after{right:22px;left:auto;}
html[data-lang="en"] .form-btn::after{left:22px;right:auto;}
html[data-lang="ar"] .section-label::after{content:'';display:inline-block;width:30px;height:1px;background:var(--cyan);flex-shrink:0;}
html[data-lang="en"] .section-label::before{content:'';display:inline-block;width:30px;height:1px;background:var(--cyan);flex-shrink:0;order:-1;}
html[data-lang="ar"] .section-label.c::before,
html[data-lang="en"] .section-label.c::after{content:'';display:inline-block;width:30px;height:1px;background:var(--cyan);flex-shrink:0;}
html[data-lang="ar"] .about-badge{inset-inline-end:-20px;}
html[data-lang="en"] .about-badge{inset-inline-start:-20px;}
html[data-lang="ar"] .port-badge{inset-inline-start:16px;}html[data-lang="ar"] .port-initial{inset-inline-end:14px;}
html[data-lang="en"] .port-badge{inset-inline-end:16px;}html[data-lang="en"] .port-initial{inset-inline-start:14px;}
html[data-lang="ar"] .btn-gold::before{transform:translateX(-101%);}
html[data-lang="en"] .btn-gold::before{transform:translateX(101%);}
.btn-gold:hover::before{transform:translateX(0)!important;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   SCROLLBAR
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--g-tri);}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   CURSOR
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.cursor{
  position:fixed;width:8px;height:8px;
  background:var(--cyan);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 16px var(--cyan),0 0 32px rgba(0,240,255,0.4);
}
.cursor-ring{
  position:fixed;width:32px;height:32px;
  border:1px solid rgba(0,240,255,0.5);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s,opacity .3s,border-color .3s;
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   NAVBAR
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
nav{
  position:fixed;top:0;width:100%;z-index:1000;
  padding:20px 60px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .4s;
}
nav.scrolled{
  background:rgba(4,4,14,0.9);
  backdrop-filter:blur(20px) saturate(1.8);
  border-bottom:1px solid var(--border);
  padding:13px 60px;
}
.nav-logo{
  font-family:'Tajawal',sans-serif;font-weight:900;font-size:1.1rem;
  color:var(--cyan);text-decoration:none;letter-spacing:1px;
  text-shadow:0 0 20px rgba(0,240,255,0.6);
  transition:text-shadow .3s;
}
.nav-logo:hover{text-shadow:0 0 40px rgba(0,240,255,1);}
.nav-links{display:flex;gap:30px;list-style:none;align-items:center;}
.nav-links a{
  color:var(--white2);text-decoration:none;
  font-family:'Space Grotesk',sans-serif;
  font-size:.72rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  position:relative;transition:color .3s;
}
html[data-lang="ar"] .nav-links a{font-family:'Tajawal',sans-serif;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;inset-inline-start:0;width:0;height:1px;background:var(--cyan);transition:width .3s;box-shadow:0 0 6px var(--cyan);}
.nav-links a:hover{color:var(--cyan);text-shadow:0 0 10px rgba(0,240,255,0.5);}
.nav-links a:hover::after{width:100%;}
.lang-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--cyan);padding:6px 16px;
  font-family:'Space Grotesk',sans-serif;
  font-size:.65rem;letter-spacing:2px;cursor:none;transition:all .3s;
  text-transform:uppercase;
}
.lang-btn:hover{background:var(--cyan);color:var(--bg);box-shadow:var(--glow-c);}
.mob-menu{display:none;background:transparent;border:1px solid var(--border);color:var(--cyan);padding:8px 14px;font-size:1rem;cursor:none;}
.mob-nav{position:fixed;inset:0;background:rgba(4,4,14,0.97);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transform:translateX(100%);transition:transform .4s cubic-bezier(.23,1,.32,1);backdrop-filter:blur(20px);}
html[data-lang="ar"] .mob-nav{transform:translateX(-100%);}
.mob-nav.open{transform:translateX(0)!important;}
.mob-close{background:transparent;border:none;color:var(--muted);font-size:1.4rem;cursor:none;position:absolute;top:22px;inset-inline-end:22px;}
.mob-link{color:var(--white2);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;transition:color .3s;}
html[data-lang="ar"] .mob-link{font-family:'Tajawal',sans-serif;}
.mob-link:hover{color:var(--cyan);text-shadow:0 0 10px rgba(0,240,255,0.5);}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   HERO
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
#hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;overflow:hidden;
  background:var(--bg);
}

/* Animated grid */
.hero-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,240,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,0.04) 1px,transparent 1px);
  background-size:50px 50px;
  animation:gridShift 20s linear infinite;
}
@keyframes gridShift{0%{background-position:0 0;}100%{background-position:50px 50px;}}

/* Neon orbs */
.orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;}
.orb-1{width:600px;height:600px;top:-150px;inset-inline-end:-200px;background:radial-gradient(circle,rgba(0,240,255,0.1) 0%,transparent 65%);animation:orbPulse 6s ease-in-out infinite;}
.orb-2{width:500px;height:500px;bottom:-150px;inset-inline-start:-150px;background:radial-gradient(circle,rgba(255,45,120,0.08) 0%,transparent 65%);animation:orbPulse 8s ease-in-out infinite reverse;}
.orb-3{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(155,93,229,0.06) 0%,transparent 70%);}

/* Scan line */
.scan-line{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(to right,transparent,rgba(0,240,255,0.4),transparent);animation:scanDown 5s linear infinite;pointer-events:none;}
@keyframes scanDown{0%{top:-2px;}100%{top:100%;}}

.hero-content{position:relative;z-index:2;padding:0 60px 130px;max-width:950px;width:100%;}

/* Live tag */
.hero-tag{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--border2);
  background:rgba(0,240,255,0.04);
  padding:7px 18px;margin-bottom:36px;
  opacity:0;animation:fadeUp .7s .1s forwards;
}
.tag-dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 10px var(--cyan);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.tag-text{font-family:'Space Grotesk',sans-serif;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);}

/* Name */
.hero-name-ar{
  font-family:'Tajawal',sans-serif;
  font-size:clamp(4.5rem,11vw,11rem);
  font-weight:900;line-height:.88;color:var(--white);
  letter-spacing:-3px;
  opacity:0;animation:fadeUp .9s .2s forwards;
}
.hero-name-ar b{
  background:var(--g-title);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-name-en{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.5rem,5.5vw,6rem);
  letter-spacing:16px;
  color:transparent;
  -webkit-text-stroke:1px rgba(0,240,255,0.35);
  margin-top:2px;
  opacity:0;animation:fadeUp .9s .35s forwards;
  /* Glitch effect */
  position:relative;
}
.hero-name-en::before,.hero-name-en::after{
  content:attr(data-text);
  position:absolute;top:0;left:0;width:100%;
  -webkit-text-stroke:1px rgba(0,240,255,0.2);
  color:transparent;
}
.hero-name-en::before{animation:glitch1 4s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);}
.hero-name-en::after{animation:glitch2 4s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);}

@keyframes glitch1{
  0%,90%,100%{transform:none;opacity:0;}
  92%{transform:translateX(-3px);opacity:.6;filter:hue-rotate(90deg);}
  94%{transform:translateX(3px);opacity:.6;}
  96%{transform:none;opacity:0;}
}
@keyframes glitch2{
  0%,93%,100%{transform:none;opacity:0;}
  95%{transform:translateX(4px);opacity:.5;filter:hue-rotate(-90deg);}
  97%{transform:translateX(-2px);opacity:.5;}
  99%{transform:none;opacity:0;}
}

.hero-divider{width:90px;height:1px;margin:24px 0;opacity:0;animation:fadeUp .7s .48s forwards;}

.hero-headline{
  font-family:'Tajawal',sans-serif;
  font-size:clamp(1.4rem,2.6vw,2.1rem);font-weight:800;
  line-height:1.4;color:var(--white);margin-bottom:14px;
  opacity:0;animation:fadeUp .8s .6s forwards;
}
html[data-lang="en"] .hero-headline{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;font-size:clamp(1.2rem,2vw,1.75rem);}

.hero-sub{
  font-size:1rem;font-weight:400;color:var(--white2);
  margin-bottom:44px;max-width:520px;line-height:1.85;
  opacity:0;animation:fadeUp .8s .75s forwards;
}

.hero-cta{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s .9s forwards;}

/* \u2500\u2500 Buttons \u2500\u2500 */
.btn-gold{
  background:var(--g-cyan);color:var(--bg);
  padding:14px 36px;
  font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:1px;
  text-decoration:none;cursor:none;display:inline-block;
  position:relative;overflow:hidden;
  box-shadow:var(--glow-c);
  transition:box-shadow .3s,transform .2s;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.btn-gold::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);transition:transform .35s cubic-bezier(.23,1,.32,1);}
.btn-gold:hover{box-shadow:0 0 50px rgba(0,240,255,0.5);transform:translateY(-2px);}
.btn-gold span{position:relative;z-index:1;}

.btn-outline{
  border:1px solid var(--border2);color:var(--cyan);
  padding:14px 36px;
  font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:1px;
  text-decoration:none;cursor:none;display:inline-block;
  transition:all .3s;
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  background:rgba(0,240,255,0.03);
}
.btn-outline:hover{background:rgba(0,240,255,0.08);border-color:var(--cyan);box-shadow:var(--glow-c);}

/* Hero stats bar */
.hero-stats{
  position:absolute;bottom:0;inset-inline:0;
  display:grid;grid-template-columns:repeat(3,1fr);
  border-top:1px solid var(--border);
  opacity:0;animation:fadeIn 1s 1.3s forwards;
}
.hstat{
  padding:20px 40px;
  border-inline-end:1px solid var(--border);
  background:rgba(0,240,255,0.02);
  backdrop-filter:blur(10px);
  transition:background .3s;
  position:relative;overflow:hidden;
}
.hstat:last-child{border-inline-end:none;}
.hstat::before{content:'';position:absolute;top:0;inset-inline-start:0;width:0;height:1px;background:var(--g-cyan);transition:width .6s;}
.hstat:hover::before{width:100%;}
.hstat:hover{background:rgba(0,240,255,0.05);}
.hstat-num{
  font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:2px;
  background:var(--g-cyan);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;filter:drop-shadow(0 0 8px rgba(0,240,255,0.4));
}
.hstat-lbl{font-family:'Space Grotesk',sans-serif;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
html[data-lang="ar"] .hstat-lbl{font-family:'Tajawal',sans-serif;}

.scroll-hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:fadeIn 1s 2s forwards;}
.scroll-bar{width:1px;height:44px;background:linear-gradient(to bottom,var(--cyan),transparent);animation:scrollPulse 2s ease-in-out infinite;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   MARQUEE
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.marquee-wrap{
  position:relative;overflow:hidden;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:13px 0;background:rgba(0,240,255,0.02);
}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;width:100px;height:100%;z-index:2;pointer-events:none;}
.marquee-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent);}
.marquee-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent);}
.marquee-inner{display:flex;width:max-content;animation:marqueeRun 25s linear infinite;}
.mq-item{white-space:nowrap;padding:0 36px;font-family:'Space Grotesk',sans-serif;font-size:.65rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);opacity:.7;}
.mq-dot{color:var(--pink);margin:0 6px;opacity:.8;}

#about{padding:var(--pad);background:var(--bg2);position:relative;overflow:hidden;}
#about::before{content:'';position:absolute;top:-100px;inset-inline-end:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,240,255,0.05) 0%,transparent 70%);pointer-events:none;}
.about-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:center;}

.about-visual-wrap{position:relative;}
.about-frame{
  position:relative;width:100%;aspect-ratio:3/4;
  background:var(--bg3);border:1px solid var(--border);overflow:hidden;
}
.about-frame-bg{
  width:100%;height:100%;

  display:flex;align-items:center;justify-content:center;
}
.about-mono{

}
.about-initials{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.about-initials span{
  font-family:'Tajawal',sans-serif;font-size:5rem;font-weight:900;
  background:var(--g-title);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 24px rgba(0,240,255,0.5));
}
/* Scan line */
.about-scan{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.about-scan::after{content:'';position:absolute;left:0;width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(0,240,255,0.5),transparent);animation:scanLine 4s ease-in-out infinite;}
@keyframes scanLine{0%{top:-5%;}100%{top:105%;}}

/* Corner brackets */

html[data-lang="en"] .corner.bl{bottom:-1px;left:-1px;border-width:0 1px 1px 0;}
